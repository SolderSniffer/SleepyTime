# 1. Hardware Drivers
CONFIG_GPIO=y
CONFIG_HWINFO=y

# 2. Power Management - The nRF54L15 Chain
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y
CONFIG_TICKLESS_KERNEL=y
# This symbol is often the missing key for HAS_PM in newer NCS versions
CONFIG_PM_POLICY_DEFAULT=y

# 3. Logging - Mandatory for RTT visibility
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=y

# 4. Timer - Essential for PM on nRF54
CONFIG_NRF_GRTC_TIMER=y

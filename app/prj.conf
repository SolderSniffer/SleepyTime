# SleepyTime — Application Kconfig
#
# Keep options grouped by subsystem. Add a comment for anything non-obvious.
# Tune stack sizes and buffer depths once real profiling data is available.

# ── Logging (UART) ─────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_UART_CONSOLE=y

# ── GPIO ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── SPI (EPD display) ─────────────────────────────────────────────────────────
CONFIG_SPI=y
CONFIG_MIPI_DBI_SPI=y
CONFIG_DISPLAY=y
CONFIG_SSD16XX=y

# ── LVGL (Graphics Library) ──────────────────────────────────────────────────
# Using LVGL as the master driver and UI framework.
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_Z_MEM_POOL_SIZE=49152
CONFIG_LV_USE_LABEL=y

# Standard fonts for the watch face
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_32=y
CONFIG_LV_FONT_MONTSERRAT_48=y

# ── I2C (LIS3DH accelerometer + PCF8563 RTC) ──────────────────────────────────
CONFIG_I2C=y

# ── Reset cause / wakeup source detection ─────────────────────────────────────
# Provides hwinfo_get_reset_cause() used in main.c to decode System Off wakeup.

# ── Retained Memory (State across System Off) ──────────────────────────────────

# ── BLE ───────────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SleepyTime"
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DM=y

# Enable CTS client
CONFIG_BT_CTS_CLIENT=y

# Enable bonding
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# ── Event message queue ───────────────────────────────────────────────────────
# K_MSGQ_DEFINE in main.c requires no extra Kconfig — included in kernel.

# ── Stack and heap ────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

# ── Power management ──────────────────────────────────────────────────────────
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=n
CONFIG_TICKLESS_KERNEL=y

# ── System On + GRTC wakeup ──────────────────────────────────────────────────
CONFIG_NRF_GRTC_TIMER=y
CONFIG_NRF_GRTC_START_SYSCOUNTER=y
CONFIG_NRF_GRTC_TIMER_SOURCE_LFXO=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y

# ── Sensor Backend ───────────────────────────────────────────────────────────
#CONFIG_SENSOR=y
#CONFIG_LIS2DH=y
CONFIG_LSM6DSO=n

# ── SleepyTime backend selection defaults ────────────────────────────────────
# Keep current runtime behavior:
#   - GRTC wakeup timer backend
#   - LIS3DH accelerometer backend
#CONFIG_SLEEPYTIME_WAKEUP_BACKEND_GRTC=y
#CONFIG_SLEEPYTIME_MOTION_BACKEND_LIS3DH=y

# TRIGGER_GLOBAL_THREAD: any-motion interrupt handled in a global work queue
# thread. Required for sensor_trigger_set() to work.
#CONFIG_LIS2DH_TRIGGER_GLOBAL_THREAD=y

CONFIG_REBOOT=y

# # Use a static random address that is stable across resets.
# # The address is generated once from FICR (factory info) and never rotates.
# CONFIG_BT_RANDOM_ADDRESS_TYPE_STATIC=y

# # Disable private address rotation entirely — not needed for a watch
# # that only talks to one bonded phone.
# CONFIG_BT_PRIVACY=n

CONFIG_DATE_TIME=y
# Disable automatic network/modem syncing to remove SNTP dependency
CONFIG_DATE_TIME_NTP=n
CONFIG_DATE_TIME_MODEM=n
CONFIG_DATE_TIME_AUTO_UPDATE=n

# Ensure networking is off if not needed
CONFIG_NETWORKING=n

CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
# SleepyTime — Hello World
#
# Uses RTT for logging output — no USB stack required.
# View output with nRF Connect for Desktop (RTT Viewer) or JLinkRTTClient.

# Logging via RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# GPIO for LED
CONFIG_GPIO=y
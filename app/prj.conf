# SleepyTime — Application Kconfig
#
# Keep options grouped by subsystem. Add a comment for anything non-obvious.
# Tune stack sizes and buffer depths once real profiling data is available.

# ── Logging (RTT) ─────────────────────────────────────────────────────────────
# RTT requires no USB stack and works before the OS is fully up.
# View with nRF Connect for Desktop → RTT Viewer, or JLinkRTTClient.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# ── GPIO ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── SPI (EPD display) ─────────────────────────────────────────────────────────
CONFIG_SPI=y

# ── I2C (LIS3DH accelerometer + PCF8563 RTC) ──────────────────────────────────
CONFIG_I2C=y

# ── Reset cause / wakeup source detection ─────────────────────────────────────
# Provides hwinfo_get_reset_cause() used in main.c to decode System Off wakeup.
CONFIG_HWINFO=y

# ── BLE ───────────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Current Time Service client (CTS) for phone/PC time sync.
CONFIG_BT_GATT_CLIENT=y

# Store bond information across System Off resets.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# ── Event message queue ───────────────────────────────────────────────────────
# K_MSGQ_DEFINE in main.c requires no extra Kconfig — included in kernel.

# ── Stack and heap ────────────────────────────────────────────────────────────
# Placeholder values — profile and tune once services are implemented.
# The BLE stack in particular needs adequate stack space.
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=2048

# ── Power management ──────────────────────────────────────────────────────────
# CONFIG_PM is not supported on nRF54L15 via the generic Zephyr PM subsystem.
# System Off is entered directly via nrfx / Zephyr sys_poweroff() in
# power_service.c. PM_DEVICE is kept for driver suspend support.
CONFIG_PM_DEVICE=y

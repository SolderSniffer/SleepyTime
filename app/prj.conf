# SleepyTime — Application Kconfig
#
# Keep options grouped by subsystem. Add a comment for anything non-obvious.
# Tune stack sizes and buffer depths once real profiling data is available.

# ── Logging (RTT) ─────────────────────────────────────────────────────────────
# RTT requires no USB stack and works before the OS is fully up.
# View with nRF Connect for Desktop → RTT Viewer, or JLinkRTTClient.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# ── GPIO ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── SPI (EPD display) ─────────────────────────────────────────────────────────
CONFIG_SPI=y

# ── I2C (LIS3DH accelerometer + PCF8563 RTC) ──────────────────────────────────
CONFIG_I2C=y

# ── Reset cause / wakeup source detection ─────────────────────────────────────
# Provides hwinfo_get_reset_cause() used in main.c to decode System Off wakeup.
CONFIG_HWINFO=y

# ── BLE ───────────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Current Time Service client (CTS) for phone/PC time sync.
CONFIG_BT_GATT_CLIENT=y

# Store bond information across System Off resets.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# ── Event message queue ───────────────────────────────────────────────────────
# K_MSGQ_DEFINE in main.c requires no extra Kconfig — included in kernel.

# ── Stack and heap ────────────────────────────────────────────────────────────
# Placeholder values — profile and tune once services are implemented.
# The BLE stack in particular needs adequate stack space.
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=2048

# ── Power management ──────────────────────────────────────────────────────────
# CONFIG_PM is not supported on nRF54L15 via the generic Zephyr PM subsystem.
# System Off is entered directly via nrfx / Zephyr sys_poweroff() in
# power_service.c. PM_DEVICE is kept for driver suspend support.
CONFIG_PM_DEVICE=y

# ── System Off + GRTC wakeup ──────────────────────────────────────────────────
# CONFIG_POWEROFF: enables sys_poweroff() and the arch_system_off() path.
#   Also gates z_nrf_grtc_wakeup_prepare() — it is compiled only when
#   both CONFIG_POWEROFF and CONFIG_NRF_GRTC_START_SYSCOUNTER are set.
CONFIG_POWEROFF=y

# CONFIG_NRF_GRTC_START_SYSCOUNTER: keeps the GRTC syscounter running in
#   System Off so z_nrf_grtc_wakeup_prepare() has a counter to arm against.
CONFIG_NRF_GRTC_START_SYSCOUNTER=y

# ── LIS3DH motion sensor ──────────────────────────────────────────────────────
# CONFIG_SENSOR: Zephyr sensor driver subsystem.
CONFIG_SENSOR=y

# CONFIG_LIS2DH: the LIS3DH is handled by the lis2dh driver family.
CONFIG_LIS2DH=y

# TRIGGER_GLOBAL_THREAD: any-motion interrupt handled in a global work queue
# thread. Required for sensor_trigger_set() to work. The alternative
# TRIGGER_OWN_THREAD uses a dedicated thread — overkill for a watch.
CONFIG_LIS2DH_TRIGGER_GLOBAL_THREAD=y